# Conda environment for DAGF-Swin (reference; adjust CUDA version to match your GPU)
name: dagf-swin
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch>=2.0
  - torchvision>=0.15
  - pip
  - pip:
      - timm>=0.6.0
      - numpy
      - Pillow
      - tqdm
      - opencv-python
      - lpips
      - pyiqa
      - thop
